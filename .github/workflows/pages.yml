name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build HTML from README
        run: |
          mkdir -p site/output
          pandoc README.md \
            --standalone \
            --template=site/template.html \
            --metadata title="BEMYAGENT.md" \
            -o site/output/index.html
          echo "bemyagent.md" > site/output/CNAME

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
