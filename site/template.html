<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title$ — Save tokens for the machine. Save orientation for the human.</title>
  <meta name="description" content="BEMYAGENT.md — A lightweight, self-bootstrapping protocol that bridges the gap between humans and AI agents.">
  <meta property="og:title" content="BEMYAGENT.md">
  <meta property="og:description" content="Save tokens for the machine. Save orientation for the human.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bemyagent.md">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0a09;
      --surface: #15120f;
      --surface-2: #1e1a16;
      --border: #2a2420;
      --text: #a89f94;
      --text-dim: #6b6259;
      --white: #e8e0d6;
      --accent: #c4841d;
      --accent-hover: #d99a38;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typography */
    h1 {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--white);
      margin-bottom: 1.25rem;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--white);
      margin: 3.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--white);
      margin: 2rem 0 0.75rem;
    }

    p { margin-bottom: 1rem; }

    strong { color: var(--white); }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    a:hover { color: var(--accent-hover); }

    /* Blockquote / Mission */
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      background: var(--surface);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 1.05rem;
    }
    blockquote p { color: var(--text-dim); margin: 0; }
    blockquote strong { color: var(--white); }

    /* Lists */
    ol, ul { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    ol li, ul li { margin-bottom: 0.6rem; padding-left: 0.25rem; }

    ul { list-style: none; }
    ul li { position: relative; padding-left: 1.25rem; }
    ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 400;
    }

    li > ul { margin-top: 0.4rem; margin-bottom: 0; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    thead { background: var(--surface-2); }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--white);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td {
      padding: 0.7rem 1rem;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }

    tr:hover td { background: rgba(196, 132, 29, 0.04); }

    td strong { color: var(--accent); }

    /* Code */
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--surface-2);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: var(--accent);
    }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.7;
    }

    /* CTA Banner */
    .cta-banner {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 100;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.4rem;
      background: var(--accent);
      color: var(--bg) !important;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 2px 12px rgba(196, 132, 29, 0.2);
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    .cta-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 20px rgba(196, 132, 29, 0.3);
      color: var(--bg) !important;
    }

    /* Footer */
    footer {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .wrapper { padding: 3rem 1.25rem 5rem; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.6rem 0.75rem; }
      .cta-banner { bottom: 1rem; right: 1rem; left: 1rem; text-align: center; }
      .cta-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    $body$
  </div>

  <div class="cta-banner">
    <a class="cta-btn" href="https://github.com/vitotafuni/bemyagent/blob/main/BEMYAGENT.md" target="_blank" rel="noopener">
      Get BEMYAGENT.md
    </a>
  </div>

  <footer>
    <p>MIT License — <a href="https://github.com/vitotafuni/bemyagent">GitHub</a></p>
  </footer>
</body>
</html>
